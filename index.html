<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка кода на почту</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; background: #121212; color: #fff; }
        .container { max-width: 400px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        input { width: 85%; padding: 12px; margin-bottom: 20px; border: 1px solid #333; border-radius: 8px; background: #2d2d2d; color: #fff; font-size: 16px; text-align: center; }
        button { padding: 12px 25px; background: #0070f3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 90%; transition: 0.2s; }
        button:hover { background: #0051a8; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Верификация по Email</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Введите ваш Email, чтобы получить секретный код</p>
        
        <input type="email" id="emailInput" placeholder="example@mail.ru">
        <br>
        <button onclick="sendCode()">Отправить код</button>
        
        <div id="status"></div>
    </div>

    <script>
        async function sendCode() {
            const email = document.getElementById('emailInput').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!email) return alert('Введите адрес почты!');
            
            statusDiv.innerHTML = '<span style="color: #aaa;">Отправка...</span>';
            
            try {
                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML = `<span style="color: #25a156; font-weight: bold;">✔ Код успешно отправлен на ${email}!</span>`;
                } else {
                    statusDiv.innerHTML = `<span style="color: #fe2c55;">Ошибка: ${data.message}</span>`;
                }
            } catch (err) {
                statusDiv.innerHTML = '<span style="color: #fe2c55;">Ошибка соединения с сервером.</span>';
            }
        }
    </script>

</body>
</html>
